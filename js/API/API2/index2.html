<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe UI</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background-color: #d8e0d4;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container{
      width: 100%;
      max-width: 1100px;
      background-color: white;
      border-radius: 30px;
      padding: 40px;
    }

    /* HEADER */
    .section-header{
      margin-bottom: 30px;
    }

    .section-header h2{
      font-size: 32px;
      margin-bottom: 10px;
      color: #111;
    }

    .section-header p{
      color: #666;
      line-height: 1.5;
      max-width: 500px;
    }

    /* PRODUCTS */
    .products-container{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .product-item{
      background-color: #f7f7f7;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .product-item:hover{
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .product-item img{
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    .product-item p{
      font-size: 16px;
      font-weight: 600;
      color: #222;
    }

    /* RESPONSIVE */
    @media(max-width: 768px){

      .container{
        padding: 25px;
      }

      .section-header h2{
        font-size: 26px;
      }

      .products-container{
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="section-header">
      <h2>Recipe Categories</h2>

      <p>
        Discover a variety of favorite recipes and enjoy
        the enticing flavors in every dish!
      </p>
    </div>

    <div class="products-container"></div>

  </div>

  <script src="script2.js"></script>
</body>
</html>
