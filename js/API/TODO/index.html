<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Planner UI</title>
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #2b6cb0; /* Vibrant blue background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Card Container */
    .todo-card {
      background-color: #ffffff;
      width: 100%;
      max-width: 550px;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    /* Input Form Row */
    .input-section {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .task-input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #2b6cb0;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
    }

    .add-btn {
      background-color: #3182ce;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .add-btn:hover {
      background-color: #2b6cb0;
    }

    /* Task List Items */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      list-style: none;
    }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #e2e8f0; /* Soft light grey/blue tint */
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      overflow: hidden; /* Keeps the delete button corners neat */
    }

    .task-text {
      padding: 14px 16px;
      color: #2d3748;
      font-size: 15px;
      flex: 1;
    }

    /* Delete Button using inline SVG for the trash icon */
    .delete-btn {
      background-color: #1a365d; /* Dark blue background */
      border: none;
      width: 45px;
      height: 48px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .delete-btn:hover {
      background-color: #2c5282;
    }

    .delete-btn svg {
      width: 18px;
      height: 18px;
      fill: #ffffff;
    }
  </style>
</head>
<body>

  <div class="todo-card">
    <div class="input-section">
      <input type="text" class="task-input" placeholder="Add a new task...">
      <button class="add-btn">Add</button>
    </div>

    <ul class="task-list">

      <li class="task-item">
        <span class="task-text">I will wake up at 8 in the morning</span>
        <button class="delete-btn" aria-label="Delete task">

          </svg>
        </button>
      </li> -->

  </div>
  <script src="script.js"></script>
</body>
</html>
